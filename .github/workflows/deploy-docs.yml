name: Deploy docs (GitHub Pages)

# Builds the bilingual MkDocs site and publishes it to GitHub Pages.
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".
# Serves the site from v0.2-dev for now; switch to main after the v0.2 merge.

on:
  push:
    branches: [v0.2-dev, main]
    paths:
      - docs/**
      - mkdocs.yml
      - requirements-docs.txt
      - .github/workflows/deploy-docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs deps
        run: pip install -r requirements-docs.txt
      - name: Build site (en + zh)
        run: mkdocs build --strict -d site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
